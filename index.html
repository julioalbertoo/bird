<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Qué pájaro es? · BirdNET</title>
<style>
    :root {
        --bg: #0f1713;
        --bg2: #16211b;
        --card: #1c2b23;
        --accent: #5fd08a;
        --accent-dark: #3a8c5c;
        --text: #e8f2ec;
        --muted: #8fa89a;
        --danger: #ff7b72;
    }
    * { box-sizing: border-box; }
    html, body {
        margin: 0;
        min-height: 100%;
        background: radial-gradient(1200px 600px at 50% -10%, var(--bg2), var(--bg));
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .wrap {
        max-width: 560px;
        margin: 0 auto;
        padding: 32px 20px 60px;
    }
    header { text-align: center; margin-bottom: 28px; }
    h1 { font-size: 1.7rem; margin: 0 0 6px; letter-spacing: -0.5px; }
    header p { color: var(--muted); margin: 0; font-size: 0.95rem; }
    .card {
        background: linear-gradient(180deg, var(--card), #172219);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 26px 22px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    }
    .mic-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        padding: 18px;
        font-size: 1.1rem;
        font-weight: 600;
        color: #06130c;
        background: var(--accent);
        border: none;
        border-radius: 16px;
        cursor: pointer;
        transition: transform .08s ease, filter .15s ease, background .2s ease;
    }
    .mic-btn:hover:not(:disabled) { filter: brightness(1.05); }
    .mic-btn:active:not(:disabled) { transform: scale(0.98); }
    .mic-btn:disabled { cursor: not-allowed; filter: grayscale(0.4) brightness(0.8); }
    .mic-btn.recording { background: var(--danger); color: #2a0806; }
    .mic-icon { width: 22px; height: 22px; }
    .status {
        margin-top: 18px;
        min-height: 20px;
        text-align: center;
        color: var(--muted);
        font-size: 0.92rem;
    }
    .bar-track {
        margin-top: 14px;
        height: 8px;
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
        overflow: hidden;
        display: none;
    }
    .bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent-dark), var(--accent));
        transition: width .2s ease;
    }
    .countdown {
        display: none;
        text-align: center;
        font-size: 3.2rem;
        font-weight: 700;
        margin: 8px 0 -4px;
        font-variant-numeric: tabular-nums;
        color: var(--accent);
    }
    .results { margin-top: 26px; display: none; }
    .results h2 { font-size: 1rem; color: var(--muted); font-weight: 600; margin: 0 0 14px; text-transform: uppercase; letter-spacing: 1px; }
    .top {
        background: linear-gradient(135deg, rgba(95,208,138,0.16), rgba(95,208,138,0.04));
        border: 1px solid rgba(95,208,138,0.35);
        border-radius: 16px;
        padding: 18px 18px 16px;
        margin-bottom: 14px;
    }
    .top .name { font-size: 1.4rem; font-weight: 700; margin: 0; }
    .top .sci { font-style: italic; color: var(--muted); margin: 2px 0 0; font-size: 0.95rem; }
    .row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 4px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .row:last-child { border-bottom: none; }
    .row .info { flex: 1; min-width: 0; }
    .row .n { font-weight: 600; }
    .row .s { font-style: italic; color: var(--muted); font-size: 0.85rem; }
    .conf {
        font-variant-numeric: tabular-nums;
        color: var(--accent);
        font-weight: 700;
        font-size: 0.95rem;
    }
    .meter { flex: 0 0 90px; height: 6px; border-radius: 999px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .meter > span { display: block; height: 100%; background: var(--accent); }
    .empty { color: var(--muted); text-align: center; padding: 10px 0; }
    .error { color: var(--danger); margin-top: 16px; text-align: center; white-space: pre-wrap; font-size: 0.9rem; }
    footer { text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 28px; line-height: 1.6; }
    footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
    <header>
        <h1>🐦 ¿Qué pájaro es?</h1>
        <p>Graba 10 segundos con tu micrófono y te digo qué ave suena.</p>
    </header>

    <div class="card">
        <button id="recordBtn" class="mic-btn" disabled>
            <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
            <span id="btnLabel">Cargando modelo…</span>
        </button>
        <div id="countdown" class="countdown">10</div>
        <div id="barTrack" class="bar-track"><div id="barFill" class="bar-fill"></div></div>
        <div id="status" class="status">Preparando BirdNET…</div>
        <div id="error" class="error"></div>

        <div id="results" class="results">
            <h2>Resultado</h2>
            <div id="resultsBody"></div>
        </div>
    </div>

    <footer>
        Detección con el modelo <strong>BirdNET</strong> del
        <a href="https://birdnet.cornell.edu" target="_blank" rel="noopener">K. Lisa Yang Center for Conservation Bioacoustics · Cornell</a>.<br>
        Todo el procesamiento ocurre en tu navegador; el audio no se sube a ningún servidor.
    </footer>
</div>

<script>
const SAMPLE_RATE = 48000;
const CHUNK_3S = 144000;      // 3 s at 48 kHz — the window BirdNET expects
const RECORD_MS = 10000;      // 10 s recording

const el = id => document.getElementById(id);
const recordBtn = el('recordBtn');
const btnLabel = el('btnLabel');
const statusEl = el('status');
const errorEl = el('error');
const barTrack = el('barTrack');
const barFill = el('barFill');
const countdown = el('countdown');
const results = el('results');
const resultsBody = el('resultsBody');

let birdNet = null;       // promise-based worker interface
let busy = false;

function setStatus(t) { statusEl.textContent = t || ''; }
function setError(t) { errorEl.textContent = t || ''; }

// ---- Load the BirdNET worker (model + labels) ----
function loadBirdNet() {
    const worker = new Worker('birdnet.js');
    function call(data) {
        worker.postMessage(data);
        return new Promise(resolve => {
            function onMessage({ data: res }) {
                if (res.message === data.message) {
                    worker.removeEventListener('message', onMessage);
                    resolve(res);
                }
            }
            worker.addEventListener('message', onMessage);
        });
    }
    return new Promise((resolve, reject) => {
        function onLoading({ data }) {
            if (typeof data.progress === 'number') { barFill.style.width = data.progress + '%'; }
            const labels = {
                load_model: 'Descargando el modelo BirdNET…',
                warmup: 'Calentando el modelo…',
                load_geomodel: 'Cargando modelo geográfico…',
                load_labels: 'Cargando nombres de especies…',
            };
            if (labels[data.message]) setStatus(labels[data.message]);
            if (data.message === 'loaded') {
                worker.removeEventListener('message', onLoading);
                resolve(call);
            }
        }
        worker.addEventListener('message', onLoading);
        worker.addEventListener('error', e => reject(new Error('Error cargando el worker: ' + e.message)));
    });
}

// ---- Optional geolocation to refine which species are likely ----
async function applyGeolocation(call) {
    if (!navigator.geolocation) return;
    try {
        const pos = await new Promise((res, rej) =>
            navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: false, timeout: 6000 }));
        await call({ message: 'area-scores', latitude: pos.coords.latitude, longitude: pos.coords.longitude });
    } catch (_) { /* location denied / unavailable — continue without geo filtering */ }
}

// ---- Record N ms of microphone audio and return 48 kHz mono Float32 PCM ----
async function recordMic(ms) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: {
        channelCount: 1, echoCancellation: false, noiseSuppression: false, autoGainControl: false
    }});
    const rec = new MediaRecorder(stream);
    const parts = [];
    rec.ondataavailable = e => { if (e.data.size) parts.push(e.data); };

    const done = new Promise(resolve => { rec.onstop = resolve; });
    rec.start();

    // Countdown UI
    countdown.style.display = 'block';
    let remaining = Math.round(ms / 1000);
    countdown.textContent = remaining;
    const timer = setInterval(() => {
        remaining -= 1;
        countdown.textContent = Math.max(0, remaining);
    }, 1000);

    await new Promise(r => setTimeout(r, ms));
    rec.stop();
    await done;
    clearInterval(timer);
    countdown.style.display = 'none';
    stream.getTracks().forEach(t => t.stop());

    const blob = new Blob(parts, { type: rec.mimeType || 'audio/webm' });
    const arrayBuffer = await blob.arrayBuffer();
    const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
    const decoded = await ctx.decodeAudioData(arrayBuffer);
    ctx.close();
    return new Float32Array(decoded.getChannelData(0));
}

// ---- Run inference over 3 s chunks and keep the best confidence per species ----
async function identify(pcm) {
    const bySpecies = new Map();
    let processed = 0;
    for (let k = 0; k < pcm.length; k += CHUNK_3S) {
        let chunk = pcm.slice(k, k + CHUNK_3S);
        if (chunk.length < CHUNK_3S) {
            const padded = new Float32Array(CHUNK_3S);
            padded.set(chunk, 0);
            chunk = padded;
        }
        const { prediction } = await birdNet({ message: 'predict', pcmAudio: chunk });
        for (const p of prediction) {
            const prev = bySpecies.get(p.sciName);
            if (!prev || p.confidence > prev.confidence) bySpecies.set(p.sciName, p);
        }
        processed += CHUNK_3S;
        barFill.style.width = Math.min(100, processed / pcm.length * 100) + '%';
    }
    return [...bySpecies.values()].sort((a, b) => b.confidence - a.confidence);
}

function renderResults(list) {
    results.style.display = 'block';
    if (!list.length) {
        resultsBody.innerHTML = '<div class="empty">No he reconocido ningún pájaro con claridad.<br>Prueba en un lugar con menos ruido o más cerca del canto.</div>';
        return;
    }
    const top = list[0];
    const pct = c => (c * 100).toFixed(0);
    let html = `
        <div class="top">
            <p class="name">${escapeHtml(cap(top.name || top.enName || top.sciName))}</p>
            <p class="sci">${escapeHtml(top.sciName)}${top.enName ? ' · ' + escapeHtml(top.enName) : ''}</p>
            <div class="row" style="border:none;padding:8px 0 0">
                <div class="meter"><span style="width:${pct(top.confidence)}%"></span></div>
                <div class="conf">${pct(top.confidence)}%</div>
            </div>
        </div>`;
    const rest = list.slice(1, 5);
    if (rest.length) {
        html += rest.map(b => `
            <div class="row">
                <div class="info">
                    <div class="n">${escapeHtml(cap(b.name || b.enName || b.sciName))}</div>
                    <div class="s">${escapeHtml(b.sciName)}</div>
                </div>
                <div class="meter"><span style="width:${pct(b.confidence)}%"></span></div>
                <div class="conf">${pct(b.confidence)}%</div>
            </div>`).join('');
    }
    resultsBody.innerHTML = html;
}

function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---- Main record + identify flow ----
async function run() {
    if (busy || !birdNet) return;
    busy = true;
    setError('');
    results.style.display = 'none';
    resultsBody.innerHTML = '';
    recordBtn.disabled = true;
    recordBtn.classList.add('recording');
    btnLabel.textContent = 'Grabando…';
    barTrack.style.display = 'none';

    try {
        const pcm = await recordMic(RECORD_MS);
        recordBtn.classList.remove('recording');
        btnLabel.textContent = 'Analizando…';
        setStatus('Escuchando el audio con BirdNET…');
        barTrack.style.display = 'block';
        barFill.style.width = '0%';
        const list = await identify(pcm);
        renderResults(list);
        setStatus('Listo. Pulsa para grabar de nuevo.');
    } catch (e) {
        console.error(e);
        if (e.name === 'NotAllowedError') {
            setError('Necesito permiso para usar el micrófono. Habilítalo y vuelve a intentarlo.');
        } else {
            setError(e.message || String(e));
        }
        setStatus('');
    } finally {
        recordBtn.classList.remove('recording');
        barTrack.style.display = 'none';
        btnLabel.textContent = '🎙️ Grabar 10 segundos';
        recordBtn.disabled = false;
        busy = false;
    }
}

recordBtn.addEventListener('click', run);

(async function init() {
    try {
        birdNet = await loadBirdNet();
        setStatus('Buscando tu ubicación (opcional)…');
        await applyGeolocation(birdNet);
        setStatus('Listo. Pulsa para grabar 10 segundos.');
        btnLabel.textContent = '🎙️ Grabar 10 segundos';
        recordBtn.disabled = false;
    } catch (e) {
        console.error(e);
        setError('No se ha podido cargar el modelo: ' + (e.message || e));
        setStatus('');
    }
})();
</script>
</body>
</html>
